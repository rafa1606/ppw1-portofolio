<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tugas 4:Identifikasi Praktikum PPW1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #0d0d0d; color: #f1f5f9; font-family: 'Segoe UI', sans-serif; }
    .card-custom { background: #1e293b; border: 1px solid rgba(249,115,22,0.3); border-radius: 12px; }
    .btn-orange { background-color: #f97316; border: none; color: white; }
    .btn-orange:hover { background-color: #ea6b08; color: white; }
    .table { color: #f1f5f9; }
    .table thead th { background-color: #f97316; color: white; border-color: #ea6b08; }
    .table tbody tr { border-color: rgba(249,115,22,0.2); }
    .table tbody td { border-color: rgba(249,115,22,0.2); }
    .badge-angkatan { background-color: rgba(249,115,22,0.2); color: #f97316; border: 1px solid #f97316; }
    h1 span { color: #f97316; }
    .alert-danger-custom { background: rgba(220,38,38,0.15); border: 1px solid #dc2626; color: #fca5a5; border-radius: 8px; padding: 20px; }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="text-center mb-4">
        <h1>Identifikasi <span>Praktikum PPW1</span></h1>
        <p class="text-muted">Tugas 4 | Rafa Irhamniyansyah Achmad | 25/557712/SV/26222</p>
      </div>

      <div class="card-custom p-4 mb-4">
        <h5 class="mb-3">Verifikasi Identitas</h5>
        <p class="text-muted">Klik tombol di bawah untuk memulai verifikasi apakah Anda adalah praktikum PPW1.</p>
        <button class="btn btn-orange w-100 py-3" onclick="cekpraktikum()">
          Mulai Verifikasi
        </button>
      </div>

      <!-- Area hasil -->
      <div id="area-hasil"></div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function cekpraktikum() {
    // Konfirmasi apakah praktikum PPW1
    var ispraktikum = confirm("Apakah Anda adalah praktikum PPW1?");

    if (ispraktikum) {
      // Jika iya, tanya data diri
      var nama = prompt("Masukkan Nama lengkap Anda:", "");
      if (nama === null || nama.trim() === "") {
        alert("Nama tidak boleh kosong!");
        return;
      }

      var nim = prompt("Masukkan NIM Anda:", "");
      if (nim === null || nim.trim() === "") {
        alert("NIM tidak boleh kosong!");
        return;
      }

      var angkatan = prompt("Masukkan Angkatan Anda (contoh: 2025):", "");
      if (angkatan === null || angkatan.trim() === "") {
        alert("Angkatan tidak boleh kosong!");
        return;
      }

      // Tampilkan dalam tabel Bootstrap
      var html = `
        <div class="card-custom p-4">
          <div class="d-flex align-items-center mb-3">
            <span class="me-2" style="font-size:1.5rem;"></span>
            <h5 class="mb-0 text-success">Verifikasi Berhasil!</h5>
          </div>
          <p class="text-muted mb-3">Berikut adalah data Anda sebagai praktikum PPW1:</p>
          <table class="table table-bordered">
            <thead>
              <tr>
                <th>Field</th>
                <th>Data</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Nama Lengkap</td>
                <td><strong>${nama}</strong></td>
              </tr>
              <tr>
                <td>NIM</td>
                <td><code>${nim}</code></td>
              </tr>
              <tr>
                <td>Angkatan</td>
                <td><span class="badge badge-angkatan px-3 py-2">${angkatan}</span></td>
              </tr>
              <tr>
                <td>Status</td>
                <td><span class="badge bg-success">Praktikum PPW1</span></td>
              </tr>
            </tbody>
          </table>
          <button class="btn btn-orange mt-2" onclick="cekpraktikum()">Ulangi Verifikasi</button>
        </div>
      `;
      document.getElementById("area-hasil").innerHTML = html;

      // Log ke console
      console.log("praktikum terverifikasi:");
      console.log("Nama: " + nama);
      console.log("NIM: " + nim);
      console.log("Angkatan: " + angkatan);

    } else {
      // Jika bukan praktikum
      var html = `
        <div class="alert-danger-custom text-center">
          <div style="font-size:3rem;">X</div>
          <h4 class="mt-2">Akses Ditolak!</h4>
          <p class="mb-3">Anda bukan praktikum PPW1, Anda tidak boleh masuk!</p>
          <button class="btn btn-orange" onclick="cekpraktikum()">Coba Lagi</button>
        </div>
      `;
      document.getElementById("area-hasil").innerHTML = html;
      console.log("Akses ditolak: Bukan praktikum PPW1");
    }
  }
</script>

</body>
</html>
