<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Landing Page</title>
  <link href="responsive.css" rel="stylesheet" />
  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
    }

    /* ── Breakpoints warna sesuai modul ── */
    @media (max-width: 480px) {
      body { background-color: lightgray; }
    }
    @media (max-width: 768px) {
      body { background-color: lightblue; }
    }
    @media (max-width: 1024px) {
      body { background-color: lightgreen; }
    }
    @media (min-width: 1025px) {
      body { background-color: white; }
    }

    /* ── Header & Nav ── */
    header {
      background-color: #4a6fa5;
      color: white;
      padding: 16px 24px;
    }

    header h1 {
      margin-bottom: 12px;
      font-size: 1.6rem;
    }

    /* CSS navbar sesuai modul hal 16 */
    nav ul {
      display: flex;
      gap: 20px;
      list-style: none;
      align-items: center;
      padding: 0;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    /* Media query navbar sesuai modul hal 16 */
    @media (max-width: 768px) {
      nav ul {
        flex-direction: column;
        gap: 10px;
      }
    }

    /* ── Main content ── */
    main {
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Hero section ── */
    .hero {
      text-align: center;
      margin-bottom: 32px;
    }

    .hero h2 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .hero p {
      color: #444;
      margin-bottom: 16px;
    }

    /* Gambar fleksibel sesuai tugas modul */
    .hero img {
      width: 100%;
      max-width: 100%;
      height: 400px;
      object-fit: cover;
      display: block;
      border-radius: 8px;
    }

    /* ── Grid cards ── */
    .grid {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1 1 calc(33.33% - 16px);
      background-color: #c8a97e;
      padding: 24px;
      text-align: center;
      border-radius: 6px;
      font-weight: bold;
      min-width: 180px;
    }

    /* Tablet — 2 kolom */
    @media (max-width: 768px) {
      .card {
        flex: 1 1 calc(50% - 16px);
      }
      .hero img {
        height: 260px;
      }
    }

    /* Mobile — 1 kolom */
    @media (max-width: 480px) {
      .card {
        flex: 1 1 100%;
      }
      .hero h2 {
        font-size: 1.3rem;
      }
      .hero img {
        height: 200px;
      }
    }

  </style>
</head>
<body>

  <header>
    <h1>My Responsive Website</h1>
    <nav>
      <ul>
        <li><a href="responsive.html">Home</a></li>
        <li><a href="about2.html">About</a></li>
        <li><a href="contact2.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h2>Welcome to My Site</h2>
      <p>This is a fully responsive webpage.</p>
      <img src="https://picsum.photos/800/400?random=5" alt="Hero Image" />
    </section>

    <section class="grid">
      <div class="card">Card 1</div>
      <div class="card">Card 2</div>
      <div class="card">Card 3</div>
    </section>
  </main>

</body>
</html>
