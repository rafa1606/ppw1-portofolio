<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profil Mahasiswa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .profile-header { background: linear-gradient(135deg, #1A56DB, #1E293B); }
    .avatar { width: 100px; height: 100px; border: 4px solid white; border-radius: 50%; }
  </style>
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">TRPL 2024</a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="#">Beranda</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Mahasiswa</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Kontak</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Header Profil -->
  <div class="profile-header text-white py-5">
    <div class="container">
      <div class="d-flex align-items-center gap-4">
        <img src="https://via.placeholder.com/100" class="avatar" alt="Foto">
        <div>
          <h2 class="mb-1">Nama Mahasiswa</h2>
          <p class="mb-2 opacity-75">NIM: 2024001 | TRPL Semester 2</p>
          <span class="badge bg-success">Aktif</span>
          <span class="badge bg-info ms-1">Web Developer</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Konten Utama -->
  <div class="container my-4">
    <div class="row g-4">
      <!-- Kolom Kiri: Info -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-header fw-bold">Informasi Pribadi</div>
          <ul class="list-group list-group-flush">
            <li class="list-group-item d-flex justify-content-between">
              <span class="text-muted">Email</span>
              <span>nama@email.com</span>
            </li>
            <li class="list-group-item d-flex justify-content-between">
              <span class="text-muted">Kota</span>
              <span>Yogyakarta</span>
            </li>
            <li class="list-group-item d-flex justify-content-between">
              <span class="text-muted">Angkatan</span>
              <span>2024</span>
            </li>
          </ul>
        </div>
      </div>
      <!-- Kolom Kanan: Nilai -->
      <div class="col-md-8">
        <div class="card">
          <div class="card-header fw-bold">Nilai Semester 1</div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-hover mb-0">
                <thead class="table-light">
                  <tr><th>Mata Kuliah</th><th>SKS</th><th>Nilai</th></tr>
                </thead>
                <tbody>
                  <tr>
                    <td>Pemrograman Web 1</td><td>3</td>
                    <td><span class="badge bg-success">A</span></td>
                  </tr>
                  <tr>
                    <td>Basis Data</td><td>3</td>
                    <td><span class="badge bg-primary">B+</span></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
