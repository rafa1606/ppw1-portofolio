<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 4 - Iframe</title>
</head>

<body style="font-family: Arial, sans-serif;">
    <h2>Demonstrasi Tag Iframe</h2>
    <p>Elemen <code>&lt;iframe&gt;</code> di bawah ini menyematkan situs web eksternal (Universitas Gadjah Mada) di
        dalam halaman web ini.</p>

    <iframe src="https://ugm.ac.id" width="100%" height="600" style="border: 2px solid #555; border-radius: 8px;"
        title="Web Resmi Universitas Gadjah Mada">
        Maaf, browser Anda tidak mendukung tag iframe. Silakan kunjungi <a href="https://ugm.ac.id">UGM</a> secara
        langsung.
    </iframe>
</body>

</html>
